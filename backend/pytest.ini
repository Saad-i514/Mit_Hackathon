[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
timeout = 120
markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (may require API keys)
    e2e: End-to-end tests (require all services running)
